<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DokiDoki - AI UPSC Answer Evaluation</title>
  <link rel="icon" type="image/png" href="dokidoki.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <img src="dokidoki.png" alt="DokiDoki Logo" class="logo-icon" />
        <span class="logo-text">DokiDoki</span>
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.dokidoki.dev.dokidoki"
         target="_blank"
         rel="noopener"
         class="download-btn">Download</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <div class="main-content" id="uploadSection">
      <h1 class="headline">Your Mains handwritten answer sheet....</h1>

      <div class="upload-bar" id="uploadBar">
        <div class="thumbnails-container" id="thumbnailsContainer"></div>

        <!-- Attachment button (always visible for adding images) -->
        <label for="fileInput" id="attachLabel" style="cursor: pointer;">
          <span class="upload-icon">📎</span>
        </label>

        <!-- Send button (only visible when images exist) -->
        <button id="sendButton" class="send-button" style="display: none;">
          →
        </button>
      </div>

      <input
        type="file"
        id="fileInput"
        accept="image/*"
        multiple
      >

      <div class="error-message" id="errorMessage"></div>
    </div>

    <!-- Results Section -->
    <div class="results-section" id="resultsSection">
      <div class="uploaded-images" id="uploadedImages"></div>

      <!-- Cards will be injected by evaluation.js -->
      <div id="evaluationCards"></div>

      <div style="text-align: center; margin: 32px 0; padding: 20px; border-top: 1px solid #2a2a2a;">
        <p style="font-size: 13px; color: #999; line-height: 1.6; margin-bottom: 12px;">
          Enjoy uninterrupted, focused community
        </p>
        <a
          href="https://play.google.com/store/apps/details?id=com.dokidoki.dev.dokidoki"
          target="_blank"
          rel="noopener"
          style="font-size: 13px; color: #00ADB5; text-decoration: none; transition: color 0.2s;"
          onmouseover="this.style.color='#61bfc5'"
          onmouseout="this.style.color='#00ADB5'"
        >
          Try DokiDoki →
        </a>
      </div>

      <div class="upload-another">
        <button class="upload-another-btn" onclick="window.uploadAnother()">
          📎 Upload Another Answer
        </button>
      </div>
    </div>
  </div>

  <!-- Loading Modal (content injected by loader.js) -->
  <div class="modal-overlay" id="loadingModal"></div>

  <!-- Footer -->
  <footer class="footer">
    <a href="explore.html">Explore</a>
    <span class="footer-divider">•</span>
    <a href="blog/index.html">Blog</a>
  </footer>


  <!-- JavaScript Modules -->
  <script src="upload.js"></script>
  <script src="evaluation.js"></script>
  <script src="loader.js"></script>
  <script src="app.js"></script>
</body>
</html>
